name: Publish Release

on:
  push:
    tags: ["v*"]

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Extract version from tag
        id: get_version
        run: |
          tag=${{ github.ref_name }}
          echo "version=${tag#"v"}" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        uses: thomaseizinger/keep-a-changelog-new-release@v3
        with:
          tag: ${{ github.ref_name }}

      - name: Bump pesde version
        uses: DervexDev/file-version-bumper@v1
        with:
          path: ./pesde.toml
          version: ${{ steps.get_version.outputs.version }}

      - name: Setup rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "release: ${{ github.ref_name }}"
          default_author: github_actions
          tag: ${{ github.ref_name }} --force
          tag_push: --force

      - name: Setup pesde
        uses: ewd3v/setup-pesde@v0.1.1
        with:
          pesde_token: "${{ secrets.PESDE_TOKEN || github.token }}"

      - name: Build
        run: rojo build build.project.json --o Pack.rbxm

      - name: Read changelog
        id: read_changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.get_version.outputs.version }}

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            # Changelog
            ${{ steps.read_changelog.outputs.changes }}

          generate_release_notes: true
          files: Pack.rbxm

      - name: Publish to pesde
        run: pesde publish -y
