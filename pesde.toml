name = "isoopod/paknet"
version = "0.1.0"
description = "Schematized networking library."
authors = ["isoopod"]
repository = "https://github.com/isoopod/PakNet"
license = "MIT"
private = true # Will not be building for pesde right now because dependencies are different

[target]
environment = "roblox"

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"

[dependencies]
Pack = { wally = "isoopod/pack", version = "^0.10.0" }
Signal = { wally = "data-oriented-house/lemonsignal", version = "^1.11.0" }
Promise = { wally = "howmanysmall/typed-promise", version = "^4.0.6" }
